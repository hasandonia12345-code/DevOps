# =========================================================
# AMANDA Enterprise Configuration - LTO-6 Tape Library
# Optimized for Database Archives & Hardware Autoloaders
# =========================================================

tapedev "hp-robot"
labelstr "DBSet2_[0-9]"
tapecycle 1
dumpcycle 0
amrecover_changer "changer"

# --- TAPE CHANGER & SCSI DEFINITION ---
# Fixed issue where tape was mounted twice or mapped incorrectly.
# /dev/sg10 = Changer (Autoloader), /dev/sg8 = Tape Drive.
define changer hp-robot {
    tapedev "chg-robot:/dev/sg10" 
    property "tape-device" "0=tape:/dev/st0"
    property append "tape-device" "1=tape:/dev/nst0"
    device-property "BLOCK_SIZE" "256k"
}

# --- TAPE HARDWARE (LTO-6) ---
# Note: Physical capacity is 2.5TB. 6.25TB is only for compressed data.
tapetype "LTO6"
define tapetype LTO6 {
    length 6553600 mbytes
    filemark 1806 kbytes
    speed 400000 kps
    blocksize 256 kbytes
}

# --- HOLDING DISK & FLUSH LOGIC ---
# Configured to fill tapes completely even if some dumps fail.
holdingdisk hd1 {
    directory "/amanda/DBSet2/holding"
    use 400 gbytes
    chunksize 1 mbyte  # Splitting larger dumps into 1MB chunks for filesystem stability
}

# Thresholds to control tape utilization and automated flushing
flush-threshold-dumped 100
flush-threshold-scheduled 100
taperflush 100
autoflush yes

# --- DUMP IDENTIFICATION ---
define dumptype gnutar-ssh {
    auth "ssh"
    program "GNUTAR"
    dumpcycle 0
    compress server best # Use LZ4 for better performance if source is uncompressed
}